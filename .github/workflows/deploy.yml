name: Deploy

on:
  push:
    branches: [master]

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/profitist

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:latest,${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:latest
          cache-to: type=inline

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        env:
          HOST: ${{ secrets.SSH_HOST }}
          USER: ${{ secrets.SSH_USER }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
        run: |
          ssh -i ~/.ssh/deploy_key $USER@$HOST bash << 'ENDSSH'
            mkdir -p ~/profitist
            cat > ~/profitist/docker-compose.yml << 'EOF'
          services:
            db:
              image: postgres:17-alpine
              restart: unless-stopped
              environment:
                POSTGRES_DB: profitist
                POSTGRES_USER: profitist
                POSTGRES_PASSWORD: profitist
              volumes:
                - pgdata:/var/lib/postgresql/data
              healthcheck:
                test: ["CMD-SHELL", "pg_isready -U profitist"]
                interval: 5s
                retries: 5

            bot:
              image: ghcr.io/ivanmihajlov/profitist:latest
              restart: unless-stopped
              env_file: .env
              depends_on:
                db:
                  condition: service_healthy

          volumes:
            pgdata:
          EOF
          ENDSSH
          ssh -i ~/.ssh/deploy_key $USER@$HOST \
            "echo '$TOKEN' | docker login ghcr.io -u $ACTOR --password-stdin && \
             cd ~/profitist && \
             docker compose pull && \
             docker compose up -d --remove-orphans && \
             docker image prune -f"
