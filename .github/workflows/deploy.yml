name: Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t profitist:latest .

      - name: Save image
        run: docker save profitist:latest | gzip > /tmp/profitist.tar.gz

      - name: Deploy to server
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          SSH_OPTS="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
          ssh $SSH_OPTS ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "mkdir -p ~/profitist"
          scp $SSH_OPTS docker-compose.yml ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/profitist/
          scp $SSH_OPTS /tmp/profitist.tar.gz ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/
          ssh $SSH_OPTS ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            set -e
            docker load < /tmp/profitist.tar.gz
            cd ~/profitist
            docker compose up -d
            rm /tmp/profitist.tar.gz
          "