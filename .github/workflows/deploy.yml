name: Deploy

on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository_owner }}/profitist

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:latest,${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:latest
          cache-to: type=inline

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            mkdir -p ~/profitist
            cat > ~/profitist/docker-compose.yml << 'EOF'
            services:
              db:
                image: postgres:17-alpine
                restart: unless-stopped
                environment:
                  POSTGRES_DB: profitist
                  POSTGRES_USER: profitist
                  POSTGRES_PASSWORD: profitist
                volumes:
                  - pgdata:/var/lib/postgresql/data
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U profitist"]
                  interval: 5s
                  retries: 5

              bot:
                image: ghcr.io/ivanmihajlov/profitist:latest
                restart: unless-stopped
                env_file: .env
                depends_on:
                  db:
                    condition: service_healthy

            volumes:
              pgdata:
            EOF
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd ~/profitist
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f