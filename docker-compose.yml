services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: profitist
      POSTGRES_USER: profitist
      POSTGRES_PASSWORD: profitist
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U profitist"]
      interval: 5s
      retries: 5

  bot:
    image: profitist:latest
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
